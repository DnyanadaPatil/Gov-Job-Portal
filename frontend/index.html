<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Govt Job Portal</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .auth-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .auth-logo { text-align: center; margin-bottom: 24px; }
    .emblem { font-size: 48px; }
    .auth-logo h1 { font-size: 20px; color: #1a237e; margin: 8px 0 4px; }
    .auth-logo p { color: #666; font-size: 13px; margin: 0; }
    .auth-title { text-align: center; color: #1a237e; margin-bottom: 5px; }
    .auth-subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; font-size: 14px; }
    .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    .btn-primary { width: 100%; padding: 12px; background: #1a237e; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    .btn-primary:hover { background: #283593; }
    .alert { display: none; padding: 10px; border-radius: 6px; margin-bottom: 12px; font-size: 14px; }
    .demo-box { margin-top: 20px; padding: 14px; background: #f3f6fb; border-radius: 8px; font-size: 12px; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="emblem">🏛️</div>
      <h1>Government of Maharashtra</h1>
      <p>Online Job Recruitment Portal</p>
    </div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Login to your account</p>
    <div class="alert" id="login-alert"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="Enter your email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter your password"/>
    </div>
    <button class="btn-primary" onclick="handleLogin()">Login</button>
    <div class="demo-box">
      <strong>📋 Demo Login:</strong><br/>
      <span style="color:#1a56db">Admin:</span> admin@govtjobs.in / secret123<br/>
      <span style="color:#0e9f6e">User:</span> rahul@example.com / secret123
    </div>
  </div>
  <script>
    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.style.display = 'block';
      el.style.background = type === 'success' ? '#d1fae5' : '#fee2e2';
      el.style.color = type === 'success' ? '#065f46' : '#991b1b';
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) { showAlert('login-alert', 'Please enter email and password!'); return; }
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('govtUser', JSON.stringify(data.user));
          localStorage.setItem('govtToken', data.token);
          showAlert('login-alert', 'Login successful! Redirecting...', 'success');
          setTimeout(() => { window.location.href = 'pages/dashboard.html'; }, 800);
        } else {
          showAlert('login-alert', 'Invalid email or password!');
        }
      } catch(e) {
        showAlert('login-alert', 'Server error! Is server running?');
      }
    }

    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleLogin();
    });

    // Redirect if already logged in
    if (localStorage.getItem('govtUser')) {
      window.location.href = 'pages/dashboard.html';
    }
  </script>
</body>
</html>
